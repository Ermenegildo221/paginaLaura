<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Para Laura 🌸</title>

<style>
/* =========================
   BASE
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #ffe6f0, #fff7fb, #ffeef5);
    overflow-x:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* =========================
   BACKGROUND PETALS
========================= */
.petal-bg{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.petal-float{
    position:absolute;
    width:12px;
    height:12px;
    background:#ff9ecb;
    border-radius:50%;
    opacity:0.6;
    animation: floatDown linear infinite;
}

@keyframes floatDown{
    0%{
        transform:translateY(-10vh) translateX(0);
        opacity:0;
    }
    10%{
        opacity:0.7;
    }
    100%{
        transform:translateY(110vh) translateX(30px);
        opacity:0;
    }
}

/* =========================
   CONTAINER
========================= */
.container{
    text-align:center;
    z-index:2;
}

/* =========================
   FLOR
========================= */
.flower-wrap{
    top-margin:100px;
    cursor:pointer;
    transform:scale(1);
    transition:0.3s;
}

.flower-wrap:active{
    transform:scale(0.95);
}

.flower{
    width:160px;
    height:160px;
    position:relative;
    margin:auto;
    animation: idleFloat 3s ease-in-out infinite;
}

@keyframes idleFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

/* pétalos */
.petal{
    position:absolute;
    width:70px;
    height:70px;
    background: radial-gradient(circle at 30% 30%, #ffb6d9, #ff6fa8);
    border-radius:50%;
    top:50%;
    left:50%;
    transform-origin:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.p1{transform:translate(-50%,-120%);}
.p2{transform:translate(20%,-70%);}
.p3{transform:translate(-120%,-20%);}
.p4{transform:translate(-50%,40%);}
.p5{transform:translate(-100%,-100%) scale(0.9);}
.p6{transform:translate(10%,10%) scale(0.9);}

.center{
    position:absolute;
    width:60px;
    height:60px;
    background:#ffd1e8;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 20px rgba(255,150,190,0.8);
}

/* =========================
   TEXTO INICIAL
========================= */
.tap-text{
    margin-top:15px;
    color:#c2185b;
    font-size:18px;
}

/* =========================
   CARTA
========================= */
.card{
    position:relative;
    width:90%;
    max-width:500px;
    margin:auto;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    opacity:0;
    transform:translateY(40px);
    transition:1s ease;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card h1{
    color:#d81b60;
    margin-bottom:10px;
}

.typewriter{
    font-size:16px;
    line-height:1.7;
    color:#444;
    min-height:120px;
}

/* =========================
   FOTOS
========================= */
.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:20px;
}

.photo{
    width:100%;
    border-radius:15px;
    overflow:hidden;
    transform:rotate(var(--r));
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
    opacity:0;
    transition:1s;
}

.photo img{
    width:100%;
    height:140px;
    object-fit:cover;
}

/* =========================
   CORAZONES
========================= */
.heart{
    position:fixed;
    color:#ff3d7f;
    animation: fly 4s linear forwards;
    pointer-events:none;
}

@keyframes fly{
    0%{transform:translateY(0) scale(0); opacity:1;}
    100%{transform:translateY(-120vh) scale(1.5); opacity:0;}
}

/* =========================
   ANIMACIÓN FLOR ABRIENDO
========================= */
.bloom{
    animation: bloom 1.2s ease forwards;
}

@keyframes bloom{
    0%{transform:scale(1);}
    50%{transform:scale(1.3) rotate(10deg);}
    100%{transform:scale(0); opacity:0;}
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width:400px){
    .flower{transform:scale(0.9);}
    .photo img{height:120px;}
}
</style>
</head>

<body>

<!-- PETAL BACKGROUND -->
<div class="petal-bg" id="bg"></div>

<div class="container">

    <!-- FLOR -->
    <div class="flower-wrap" id="flowerBtn">
        <div class="flower" id="flower">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="center"></div>
        </div>
        <div class="tap-text">Tócame 🌸</div>
    </div>

    <!-- CARTA -->
    <div class="card" id="card">
        <h1>Para Laura 🌸</h1>

        <div class="typewriter" id="text"></div>

        <!-- FOTOS -->
        <div class="gallery">
            <div class="photo" style="--r:-3deg"><img src="foto1.jpg"></div>
            <div class="photo" style="--r:2deg"><img src="foto2.jpg"></div>
            <div class="photo" style="--r:-2deg"><img src="foto3.jpg"></div>
            <div class="photo" style="--r:3deg"><img src="foto4.jpg"></div>
        </div>

        <p style="margin-top:20px;color:#d81b60;font-weight:bold;">
            Con todo mi amor, Adrián ❤️
        </p>
    </div>

</div>

<script>

/* =========================
   PETAL BACKGROUND GENERATOR
========================= */
const bg = document.getElementById("bg");

for(let i=0;i<25;i++){
    let p = document.createElement("div");
    p.className = "petal-float";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (5+Math.random()*5)+"s";
    p.style.animationDelay = Math.random()*5+"s";
    bg.appendChild(p);
}

/* =========================
   TYPEWRITER TEXT
========================= */

const message = `
Laura, no sé cómo explicarlo con palabras,
pero desde que llegaste todo es más bonito.

Me haces feliz de una forma que no sabía que existía.
Y si tuviera que elegir otra vez,
te volvería a elegir a ti.

Soy incapaz de imaginarme una vida sin ti, 
te has vuelto lo mas importante de mi vida
en muy poco tiempo,
lo eres todo para mí y espero que 
estemos juntos el resto de nuestras vidas.

Se que no lo digo mucho y a veces puede parecer
que no, pero te amo con todo mi alma
`;

let i = 0;
const textEl = document.getElementById("text");

function typeWriter(){
    if(i < message.length){
        textEl.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}

/* =========================
   HEARTS
========================= */

function hearts(){
    for(let i=0;i<30;i++){
        setTimeout(()=>{
            const h = document.createElement("div");
            h.className = "heart";
            h.innerHTML = "❤️";
            h.style.left = Math.random()*100 + "vw";
            h.style.fontSize = (15+Math.random()*25)+"px";
            document.body.appendChild(h);

            setTimeout(()=>h.remove(),4000);
        }, i*80);
    }
}

/* =========================
   CLICK FLOWER
========================= */

const flower = document.getElementById("flower");
const btn = document.getElementById("flowerBtn");
const card = document.getElementById("card");

btn.addEventListener("click", ()=>{

    flower.classList.add("bloom");

    hearts();

    setTimeout(()=>{
        btn.style.display="none";
        card.classList.add("show");
        typeWriter();

        setTimeout(()=>{
            document.querySelectorAll(".photo").forEach((p,i)=>{
                setTimeout(()=>{
                    p.style.opacity = 1;
                    p.style.transform += " scale(1)";
                }, i*300);
            });
        }, 1200);

    }, 1000);

});

</script>

</body>
</html>
